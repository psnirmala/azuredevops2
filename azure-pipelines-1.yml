trigger:
- main

pool:
  vmImage: 'ubuntu-latest'
variables:
  purpose: using variables
stages:
- stage: Build
  jobs:
  - job: FirstJob
    steps: 
    - bash: |
        echo Build FirstJob
        echo $(purpose)
    
  - job: SecondJob
    steps:
    - bash: echo Build SecondJob
- stage: DevDeploy
  variables:
    environment: Dev
  dependsOn: Build
  jobs:
  - job: DevDeployJob
    steps:
    - bash: echo $(environment)DeployJob
    - bash: echo purpose is $(purpose)
- stage: QADeploy
  variables:
    environment: QA
  dependsOn: Build
  jobs:
  - job: QADeployJob
    steps:
    - bash: echo $(environment)DeployJob
- stage: ProdDeploy
  dependsOn: 
  - DevDeploy
  - QADeploy
  jobs:
  - job: ProdDeployJob
    steps:
    - bash: echo ProdDeployJob